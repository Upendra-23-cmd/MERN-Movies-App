services:
  web:
    build: ./frontend
    container_name: frontend
    restart: always
    depends_on:
      - backend
    networks:
      - movies-network
    ports:
      - "8080:8080"
  api:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - movies-network
    environment:
      - POST=3000
      - MONGO_URI='mongodb://mongodb:27017/moviesApp'
      - NODE_ENV='development'
      - JWT_SECRET=alskdfjlkasdfjlksa23123asdlfk
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - movies-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=moviesApp
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
   driver: local
networks:
  movies-network:
    driver: bridge    